<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>YouTube Transcript Q&A</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="container">
    <h2>YouTube Transcript Q&A</h2>

    <label>Language code</label>
    <input id="lang" type="text" value="en" />

    <label>Question</label>
    <textarea id="question" rows="5" placeholder="Ask a question about this video..."></textarea>

    <button id="askBtn">Ask</button>

    <div id="status"></div>
    <div id="answer"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
